server:
  port: 8080
spring:
  datasource:
    url: jdbc:mysql://localhost:3307/my_blog?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
blog:
  jwt:
    secret: ReplaceThisSecretWithAtLeast32Characters123456
    expiration: 604800000
springdoc:
  swagger-ui:
    path: /swagger-ui.html
logging:
  level:
    org.springframework.web: info
    org.hibernate.SQL: warn